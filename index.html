<script type="module">

document.addEventListener("DOMContentLoaded", async function () {

  const querySnapshot = await getDocs(collection(db, "bills"));

  let bills = [];

  querySnapshot.forEach((doc) => {
    bills.push(doc.data());
  });

  let total = bills.length;

  let complete = bills.filter(b => b.status === "complete").length;

  let pending = bills.filter(b => b.status === "pending").length;

  document.getElementById("totalCount").innerText = total;

  document.getElementById("completeCount").innerText = complete;

  document.getElementById("pendingCount").innerText = pending;

});

</script>
<script>
function toggleMenu() {
  let menu = document.getElementById("menuDropdown");

  if (menu.style.display === "block") {
    menu.style.display = "none";
  } else {
    menu.style.display = "block";
  }
}

// close when clicking outside
document.addEventListener("click", function(e) {
  if (!e.target.closest(".topMenu")) {
    document.getElementById("menuDropdown").style.display = "none";
  }
});

</script>
<script>
function openSidebar() {
  document.getElementById("sidebar").style.left = "0";

  
  document.querySelector(".menuIcon").style.display = "none";
}

function closeSidebar() {
  document.getElementById("sidebar").style.left = "-260px";

  
  document.querySelector(".menuIcon").style.display = "block";
}


document.addEventListener("click", function(e) {
  let sidebar = document.getElementById("sidebar");

  if (!sidebar.contains(e.target) && !e.target.classList.contains("menuIcon")) {
    sidebar.style.left = "-250px";
  }
});

</script>
